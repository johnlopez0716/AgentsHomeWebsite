kind = "web"
previewPath = "/enchant-dashboard/"
title = "Enchant Dashboard"
version = "1.0.0"
id = "artifacts/enchant-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/enchant-dashboard/" ]
localPort = 24180

[services.development]
run = "pnpm --filter @workspace/enchant-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/enchant-dashboard", "run", "build" ]
publicDir = "artifacts/enchant-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24180"
BASE_PATH = "/enchant-dashboard/"
